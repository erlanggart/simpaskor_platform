services:
  # PostgreSQL Database
  database:
    image: postgres:15
    container_name: simpaskor_database
    environment:
      POSTGRES_DB: simpaskor_db
      POSTGRES_USER: simpaskor_user
      POSTGRES_PASSWORD: simpaskor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simpaskor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simpaskor_user -d simpaskor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simpaskor_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://simpaskor_user:simpaskor_password@database:5432/simpaskor_db
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules
      - /app/dist
    depends_on:
      database:
        condition: service_healthy
    networks:
      - simpaskor-network
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npm run dev"

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simpaskor_frontend
    env_file:
      - ./frontend/.env
    environment:
      DOCKER: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - simpaskor-network
    command: npm run dev

  # pgAdmin (Optional database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simpaskor_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@simpaskor.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - database
    networks:
      - simpaskor-network

volumes:
  postgres_data:

networks:
  simpaskor-network:
    driver: bridge

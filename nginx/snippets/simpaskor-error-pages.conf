# Simpaskor custom fallback for deploy/restart windows.
# Include this file inside the production server block that proxies to Vite.
#
# Example:
#   server {
#     server_name simpaskor.id www.simpaskor.id;
#     include /etc/nginx/snippets/simpaskor-error-pages.conf;
#     ...
#   }

error_page 500 502 503 504 /system-update.html;

location = /system-update.html {
	root /var/www/simpaskor;
	internal;
	add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
}
